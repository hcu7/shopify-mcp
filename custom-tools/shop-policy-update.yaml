name: shop_policy_update
domain: online_store
description: |
  Update a shop legal policy body (shopPolicyUpdate). Pass the ShopPolicy GID + the new HTML body.
  MODIFIES PUBLIC LEGAL CONTENT — read first via shop_policies and edit the raw body deliberately.
scopes:
  - write_content
input:
  policy_type:
    type: string
    description: ShopPolicyType enum — REFUND_POLICY, PRIVACY_POLICY, TERMS_OF_SERVICE, SHIPPING_POLICY, LEGAL_NOTICE, CONTACT_INFORMATION, SUBSCRIPTION_POLICY, TERMS_OF_SALE (from shop_policies)
    required: true
  body:
    type: string
    description: New policy body as HTML
    required: true
graphql: |
  mutation ShopPolicyUpdateCS($policy_type: ShopPolicyType!, $body: String!) {
    shopPolicyUpdate(shopPolicy: {type: $policy_type, body: $body}) {
      shopPolicy {
        id
        type
        title
        url
        body
      }
      userErrors {
        field
        message
      }
    }
  }
response:
  mapping: data.shopPolicyUpdate
