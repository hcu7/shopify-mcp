name: returnable_fulfillments
domain: orders
description: |
  List the returnable fulfillment line items of an order (their fulfillmentLineItem id +
  max returnable quantity). Needed to build the returnLineItems for return_create.
  NOTE: returnableFulfillments is a TOP-LEVEL query (arg orderId: ID!), NOT a field on Order.
scopes:
  - read_orders
input:
  order_id:
    type: string
    description: Order GID (e.g. gid://shopify/Order/123)
    required: true
graphql: |
  query ReturnableFulfillments($order_id: ID!) {
    returnableFulfillments(orderId: $order_id, first: 20) {
      edges {
        node {
          id
          fulfillment { id }
          returnableFulfillmentLineItems(first: 50) {
            edges {
              node {
                quantity
                fulfillmentLineItem {
                  id
                  lineItem { id title sku quantity variantTitle }
                }
              }
            }
          }
        }
      }
    }
  }
response:
  mapping: data
