name: inventory_bulk_toggle_activation
domain: inventory
description: |
  Activate or deactivate a single inventory item at multiple locations in one call.
  Use this after creating a variant to make it trackable at Hive + Hohwisch (or any
  set of locations) in one request. Newly-activated items start at 0 on hand.
  For multiple items across the same locations, call once per item.
scopes:
  - write_inventory
input:
  inventory_item_id:
    type: string
    description: InventoryItem GID (e.g. gid://shopify/InventoryItem/44556)
    required: true
  inventory_item_updates:
    type: object
    description: |
      Array of location-specific activation changes. Each: {
        locationId: "gid://shopify/Location/12345",
        activate: true,                    # true = activate, false = deactivate
        available: 0                       # optional initial quantity
      }
    required: true
graphql: |
  mutation InventoryBulkToggleActivation(
    $inventory_item_id: ID!
    $inventory_item_updates: [InventoryBulkToggleActivationInput!]!
  ) {
    inventoryBulkToggleActivation(
      inventoryItemId: $inventory_item_id
      inventoryItemUpdates: $inventory_item_updates
    ) {
      inventoryLevels {
        id
        quantities(names: ["available", "on_hand"]) {
          name
          quantity
        }
        item {
          id
          sku
        }
        location {
          id
          name
        }
      }
      userErrors {
        field
        message
        code
      }
    }
  }
response:
  mapping: data.inventoryBulkToggleActivation
