name: inventory_bulk_toggle_activation
domain: inventory
description: |
  Activate or deactivate multiple inventory items at a single location in one call.
  Use this to bulk-activate all new variants at Hive + Hohwisch locations after
  creating variants. Newly-activated items start at 0 on hand.
scopes:
  - write_inventory
input:
  location_id:
    type: string
    description: Location GID (e.g. gid://shopify/Location/12345). Get via list_locations.
    required: true
  inventory_item_updates:
    type: object
    description: |
      Array of activation changes. Each: {
        inventoryItemId: "gid://shopify/InventoryItem/44556",
        activate: true                       # true = activate, false = deactivate
      }
    required: true
graphql: |
  mutation InventoryBulkToggleActivation(
    $location_id: ID!
    $inventory_item_updates: [InventoryBulkToggleActivationInput!]!
  ) {
    inventoryBulkToggleActivation(
      locationId: $location_id
      inventoryItemUpdates: $inventory_item_updates
    ) {
      inventoryLevels {
        id
        quantities(names: ["available", "on_hand"]) {
          name
          quantity
        }
        item {
          id
          sku
        }
        location {
          id
          name
        }
      }
      userErrors {
        field
        message
        code
      }
    }
  }
response:
  mapping: data.inventoryBulkToggleActivation
