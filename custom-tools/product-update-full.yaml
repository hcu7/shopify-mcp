name: product_update_full
domain: products
description: |
  Extended product update — supports all fields the built-in update_product does not:
  handle (URL slug), SEO title/description, tags, category, gift-card flag, template suffix.
  Use this when you need to change a URL handle, set SEO metadata, or replace tags.
  For simple title/description/vendor/status changes the built-in update_product is fine.
scopes:
  - write_products
input:
  input:
    type: object
    description: |
      ProductInput object with any subset of: {
        id: "gid://shopify/Product/12345",   # required
        title, descriptionHtml, vendor, productType, handle,
        status: "ACTIVE" | "DRAFT" | "ARCHIVED",
        tags: ["tag1", "tag2"],              # REPLACES existing tags
        seo: { title, description },
        templateSuffix, giftCard,
        category: "gid://shopify/TaxonomyCategory/..."
      }
      Field names must be camelCase (Shopify GraphQL spelling).
    required: true
graphql: |
  mutation ProductUpdateFull($input: ProductInput!) {
    productUpdate(input: $input) {
      product {
        id
        title
        handle
        vendor
        productType
        status
        tags
        descriptionHtml
        templateSuffix
        isGiftCard
        category { id name }
        seo { title description }
        updatedAt
      }
      userErrors {
        field
        message
      }
    }
  }
response:
  mapping: data.productUpdate
